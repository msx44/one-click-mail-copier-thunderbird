<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 600px; color: #333; background-color: #f8f9fa; }
    h2 { border-bottom: 2px solid #2b8a3e; padding-bottom: 5px; color: #2b8a3e; }
    p { font-size: 13px; color: #666; }
    textarea { width: 100%; height: 150px; font-family: monospace; font-size: 14px; padding: 10px; box-sizing: border-box; border: 1px solid #ced4da; border-radius: 4px; }
    .tags { margin-top: 10px; margin-bottom: 20px; }
    .tag { display: inline-block; background: #e9ecef; padding: 4px 8px; margin: 3px; border-radius: 3px; font-size: 12px; font-family: monospace; cursor: pointer; border: 1px solid #ced4da; }
    .tag:hover { background: #dee2e6; }
    button { background: #2b8a3e; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: bold; }
    button:hover { background: #237032; }
    #status { margin-left: 10px; font-weight: bold; color: #2b8a3e; font-size: 13px; }
  </style>
</head>
<body>
  <h2>📋 コピーフォーマット設定</h2>
  <p>メールをコピーする際のテンプレートを編集してください。下記のタグをクリックすると、テキストエリアのカーソル位置に自動挿入されます。</p>
  
  <div class="tags" id="tagContainer">
    </div>

  <textarea id="templateFormat" placeholder="ここにテンプレートを入力してください"></textarea>
  
  <div style="margin-top: 15px;">
    <button id="saveBtn">設定を保存</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
